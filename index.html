<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>가계부</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #fff; color: #1a1a1a; padding: 24px; }
  h1 { font-size: 22px; font-weight: 500; margin-bottom: 4px; }
  .sub { font-size: 13px; color: #888; margin-bottom: 28px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 28px; }
  .card { border: 0.5px solid #e0e0e0; border-radius: 12px; padding: 20px; }
  .card-title { font-size: 13px; font-weight: 500; color: #888; margin-bottom: 16px; letter-spacing: 0.04em; }
  .donut-wrap { position: relative; width: 140px; height: 140px; margin: 0 auto 16px; }
  .donut-wrap canvas { width: 140px !important; height: 140px !important; }
  .donut-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; }
  .donut-pct { font-size: 22px; font-weight: 500; }
  .donut-label { font-size: 11px; color: #888; margin-top: 1px; }
  .legend { display: flex; justify-content: center; gap: 16px; margin-bottom: 16px; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: #666; }
  .legend-dot { width: 8px; height: 8px; border-radius: 2px; }
  .divider { border: none; border-top: 0.5px solid #eee; margin: 16px 0; }
  .row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .row:last-child { margin-bottom: 0; }
  .row-label { font-size: 13px; color: #555; }
  .row-input { width: 90px; }
  input[type=number] { width: 90px; font-size: 13px; padding: 5px 8px; border: 0.5px solid #ddd; border-radius: 6px; text-align: right; outline: none; }
  input[type=number]:focus { border-color: #999; }
  .fixed-badge { font-size: 11px; color: #999; background: #f5f5f5; padding: 3px 7px; border-radius: 4px; }
  .summary { background: #f8f8f8; border-radius: 10px; padding: 14px 16px; margin-top: 4px; }
  .summary-row { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 6px; }
  .summary-row:last-child { margin-bottom: 0; font-weight: 500; }
  .over { color: #e24b4a; }
  .ok { color: #1d9e75; }
  .reset { display: block; width: 100%; margin-top: 20px; padding: 10px; font-size: 13px; border: 0.5px solid #ddd; border-radius: 8px; background: #fff; cursor: pointer; color: #666; }
  .reset:hover { background: #f5f5f5; }
  @media (max-width: 480px) { .grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<h1>가계부</h1>
<p class="sub">이번달 지출을 입력하세요</p>

<div class="grid">
  <div class="card">
    <div class="card-title">카드 · 300,000원</div>
    <div class="donut-wrap">
      <canvas id="cardChart"></canvas>
      <div class="donut-center">
        <div class="donut-pct" id="cardPct">10%</div>
        <div class="donut-label">사용</div>
      </div>
    </div>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:#378ADD"></div>사용</div>
      <div class="legend-item"><div class="legend-dot" style="background:#e8e8e8"></div>잔여</div>
    </div>
    <hr class="divider">
    <div class="row"><span class="row-label">클로드 + 애플</span><span class="fixed-badge">31,000 고정</span></div>
    <div class="row"><span class="row-label">공과금 예비</span><input type="number" id="c1" placeholder="0" oninput="calc()"></div>
    <div class="row"><span class="row-label">식재료</span><input type="number" id="c2" placeholder="0" oninput="calc()"></div>
    <div class="row"><span class="row-label">카페 · 개인지출</span><input type="number" id="c3" placeholder="0" oninput="calc()"></div>
    <hr class="divider">
    <div class="summary">
      <div class="summary-row"><span style="color:#888">사용</span><span id="cardUsed">31,000원</span></div>
      <div class="summary-row"><span style="color:#888">잔여</span><span id="cardLeft">269,000원</span></div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">현금 · 200,000원</div>
    <div class="donut-wrap">
      <canvas id="cashChart"></canvas>
      <div class="donut-center">
        <div class="donut-pct" id="cashPct">50%</div>
        <div class="donut-label">사용</div>
      </div>
    </div>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:#1D9E75"></div>사용</div>
      <div class="legend-item"><div class="legend-dot" style="background:#e8e8e8"></div>잔여</div>
    </div>
    <hr class="divider">
    <div class="row"><span class="row-label">동아리 회비</span><span class="fixed-badge">50,000 고정</span></div>
    <div class="row"><span class="row-label">주택청약</span><span class="fixed-badge">50,000 고정</span></div>
    <div class="row"><span class="row-label">학식</span><input type="number" id="h1" placeholder="0" oninput="calc()"></div>
    <div class="row"><span class="row-label">술 · 모임</span><input type="number" id="h2" placeholder="0" oninput="calc()"></div>
    <hr class="divider">
    <div class="summary">
      <div class="summary-row"><span style="color:#888">사용</span><span id="cashUsed">100,000원</span></div>
      <div class="summary-row"><span style="color:#888">잔여</span><span id="cashLeft">100,000원</span></div>
    </div>
  </div>
</div>

<button class="reset" onclick="resetAll()">초기화</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const CARD_BUDGET = 300000;
const CASH_BUDGET = 200000;
const CARD_FIXED = 31000;
const CASH_FIXED = 100000;

function makeChart(id, used, total, color) {
  const remain = Math.max(total - used, 0);
  const over = Math.max(used - total, 0);
  return new Chart(document.getElementById(id), {
    type: 'doughnut',
    data: {
      datasets: [{
        data: over > 0 ? [total, 0, over] : [used, remain],
        backgroundColor: over > 0 ? [color, '#e8e8e8', '#e24b4a'] : [color, '#e8e8e8'],
        borderWidth: 0,
        hoverOffset: 0
      }]
    },
    options: {
      responsive: false,
      cutout: '72%',
      plugins: { legend: { display: false }, tooltip: { enabled: false } },
      animation: { duration: 400 }
    }
  });
}

const cardChart = makeChart('cardChart', CARD_FIXED, CARD_BUDGET, '#378ADD');
const cashChart = makeChart('cashChart', CASH_FIXED, CASH_BUDGET, '#1D9E75');

function fmt(n) { return n.toLocaleString() + '원'; }

function calc() {
  const c1 = parseInt(document.getElementById('c1').value) || 0;
  const c2 = parseInt(document.getElementById('c2').value) || 0;
  const c3 = parseInt(document.getElementById('c3').value) || 0;
  const h1 = parseInt(document.getElementById('h1').value) || 0;
  const h2 = parseInt(document.getElementById('h2').value) || 0;

  const cardUsed = CARD_FIXED + c1 + c2 + c3;
  const cashUsed = CASH_FIXED + h1 + h2;
  const cardLeft = CARD_BUDGET - cardUsed;
  const cashLeft = CASH_BUDGET - cashUsed;

  const cardPct = Math.round((cardUsed / CARD_BUDGET) * 100);
  const cashPct = Math.round((cashUsed / CASH_BUDGET) * 100);

  document.getElementById('cardPct').textContent = cardPct + '%';
  document.getElementById('cashPct').textContent = cashPct + '%';

  document.getElementById('cardUsed').textContent = fmt(cardUsed);
  document.getElementById('cashUsed').textContent = fmt(cashUsed);

  const cardLeftEl = document.getElementById('cardLeft');
  const cashLeftEl = document.getElementById('cashLeft');

  if (cardLeft < 0) {
    cardLeftEl.textContent = fmt(Math.abs(cardLeft)) + ' 초과';
    cardLeftEl.className = 'over';
    document.getElementById('cardPct').className = 'donut-pct over';
  } else {
    cardLeftEl.textContent = fmt(cardLeft);
    cardLeftEl.className = 'ok';
    document.getElementById('cardPct').className = 'donut-pct';
  }

  if (cashLeft < 0) {
    cashLeftEl.textContent = fmt(Math.abs(cashLeft)) + ' 초과';
    cashLeftEl.className = 'over';
    document.getElementById('cashPct').className = 'donut-pct over';
  } else {
    cashLeftEl.textContent = fmt(cashLeft);
    cashLeftEl.className = 'ok';
    document.getElementById('cashPct').className = 'donut-pct';
  }

  const cardRemain = Math.max(CARD_BUDGET - cardUsed, 0);
  const cardOver = Math.max(cardUsed - CARD_BUDGET, 0);
  cardChart.data.datasets[0].data = cardOver > 0 ? [CARD_BUDGET, 0, cardOver] : [cardUsed, cardRemain];
  cardChart.data.datasets[0].backgroundColor = cardOver > 0 ? ['#378ADD', '#e8e8e8', '#e24b4a'] : ['#378ADD', '#e8e8e8'];
  cardChart.update();

  const cashRemain = Math.max(CASH_BUDGET - cashUsed, 0);
  const cashOver = Math.max(cashUsed - CASH_BUDGET, 0);
  cashChart.data.datasets[0].data = cashOver > 0 ? [CASH_BUDGET, 0, cashOver] : [cashUsed, cashRemain];
  cashChart.data.datasets[0].backgroundColor = cashOver > 0 ? ['#1D9E75', '#e8e8e8', '#e24b4a'] : ['#1D9E75', '#e8e8e8'];
  cashChart.update();
}

function resetAll() {
  ['c1','c2','c3','h1','h2'].forEach(id => document.getElementById(id).value = '');
  calc();
}
</script>
</body>
</html>
